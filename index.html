<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IL Legislator Contact Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "SF Pro Text", sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 20px; font-weight: 700; color: #1a3a5c; }
  .header p { font-size: 14px; color: #5a6e82; margin-top: 6px; }
  .cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
  .card { display: block; background: white; border-radius: 14px; border: 1px solid #d0dcea; padding: 18px 20px; text-decoration: none; display: flex; align-items: center; gap: 16px; transition: background 0.12s; }
  .card:active { background: #f0f4f8; }
  .avatar { width: 48px; height: 48px; border-radius: 12px; background: #1a3a5c; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; letter-spacing: 0.03em; flex-shrink: 0; }
  .card-text { flex: 1; }
  .card-name { font-size: 17px; font-weight: 600; color: #0d1b2a; }
  .card-sub { font-size: 13px; color: #5a6e82; margin-top: 2px; }
  .arrow { color: #aabccc; font-size: 20px; }
</style>
</head>
<body>

    <a class="card" href="TS/index.html">
